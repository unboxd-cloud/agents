# GitLab CI/CD: test -> publish OCI images -> deploy Helm chart.
# Mirror of .github/workflows (ci.yml + deploy.yml) for GitLab users.
stages: [test, publish, deploy]

variables:
  REGISTRY: "$CI_REGISTRY"
  NAMESPACE: "$CI_REGISTRY_IMAGE"

test:
  stage: test
  image: golang:1.24
  script:
    - go vet ./...
    - go test ./... -count=1
    - make build

publish:
  stage: publish
  image: docker:27
  services: [docker:27-dind]
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - |
      for svc in catalog metering billing compliance admin operator orgconsole; do
        docker build --build-arg SERVICE=$svc -t "$NAMESPACE/$svc:$CI_COMMIT_TAG" .
        docker push "$NAMESPACE/$svc:$CI_COMMIT_TAG"
      done

deploy:
  stage: deploy
  image: alpine/helm:3.16.1
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
  script:
    - |
      helm upgrade --install platform deploy/helm/platform \
        --set image.registry="$CI_REGISTRY" \
        --set image.repository="$CI_PROJECT_PATH" \
        --set image.tag="$CI_COMMIT_TAG" \
        --set-file datasets.files.offerings\.json=deploy/datasets/offerings.json \
        --set-file datasets.files.pricebook\.json=deploy/datasets/pricebook.json \
        --set-file datasets.files.tax-rules\.json=deploy/datasets/tax-rules.json \
        --set-file datasets.files.compliance-frameworks\.json=deploy/datasets/compliance-frameworks.json
