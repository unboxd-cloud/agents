name: security

# Real (non-bypassing) security scanning. Runs on PRs, weekly, and on demand.
# - govulncheck: Go package/stdlib vulnerabilities (fails on findings).
# - Trivy: image scan for HIGH/CRITICAL (fails on findings). Our images are
#   scratch + a single static, stdlib-only binary, so the scannable surface is
#   minimal — this passes on a clean tree rather than being silenced.
# Secret scanning is handled by GitHub's native secret scanning / push
# protection (enable in repo settings); gitleaks-action needs an org license and
# is intentionally not used here.
on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vuln-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable" # scan on the latest patched Go toolchain
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  scan-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, metering, billing, compliance, admin, operator, orgconsole]
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy CLI
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin v0.58.1
      - name: Build image (podman) and export as docker-archive
        run: |
          podman build --build-arg SERVICE=${{ matrix.service }} -t scan-${{ matrix.service }}:ci .
          # podman-built images aren't visible to Docker; export an explicit
          # docker-archive tar so the Trivy CLI can scan it daemonlessly.
          podman save --format docker-archive -o /tmp/${{ matrix.service }}.tar scan-${{ matrix.service }}:ci
      - name: Trivy scan (HIGH,CRITICAL)
        run: |
          trivy image --input /tmp/${{ matrix.service }}.tar \
            --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress
