name: security

# Security scanning is informational on PRs (does not block the draft), and runs
# on a weekly schedule for visibility. The authoritative gate is ci.yml.
on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vuln-go:
    runs-on: ubuntu-latest
    continue-on-error: true # informational: stdlib CVEs shouldn't block a draft
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: govulncheck (Go package vulnerabilities)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  scan-images:
    runs-on: ubuntu-latest
    continue-on-error: true # informational
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, metering, billing, compliance, admin, operator, orgconsole]
    steps:
      - uses: actions/checkout@v4
      - name: Build image (podman)
        run: podman build --build-arg SERVICE=${{ matrix.service }} -t scan/${{ matrix.service }}:ci .
      - name: Trivy image scan (report-only)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: scan/${{ matrix.service }}:ci
          format: table
          exit-code: "0" # report findings; do not fail the job
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  secrets:
    runs-on: ubuntu-latest
    continue-on-error: true # gitleaks-action needs an org license; keep non-blocking
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
