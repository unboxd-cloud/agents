name: security

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly

jobs:
  vuln-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: govulncheck (Go package vulnerabilities)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  scan-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, metering, billing, compliance, admin, operator, orgconsole]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build --build-arg SERVICE=${{ matrix.service }} -t scan/${{ matrix.service }}:ci .
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: scan/${{ matrix.service }}:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
