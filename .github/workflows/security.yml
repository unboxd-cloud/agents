name: security

# Real (non-bypassing) security scanning. Runs on PRs, weekly, and on demand.
# - govulncheck: Go package/stdlib vulnerabilities (fails on findings).
# - Trivy: image scan for HIGH/CRITICAL (fails on findings). Our images are
#   scratch + a single static, stdlib-only binary, so the scannable surface is
#   minimal — this passes on a clean tree rather than being silenced.
# Secret scanning is handled by GitHub's native secret scanning / push
# protection (enable in repo settings); gitleaks-action needs an org license and
# is intentionally not used here.
on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vuln-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable" # scan on the latest patched Go toolchain
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  scan-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, metering, billing, compliance, admin, operator, orgconsole]
    steps:
      - uses: actions/checkout@v4
      - name: Build image (podman) and export to tar
        run: |
          podman build --build-arg SERVICE=${{ matrix.service }} -t scan/${{ matrix.service }}:ci .
          # Export so Trivy can scan the podman-built image without a Docker daemon.
          podman save -o /tmp/${{ matrix.service }}.tar scan/${{ matrix.service }}:ci
      - name: Trivy image scan (HIGH,CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          input: /tmp/${{ matrix.service }}.tar
          scan-type: image
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
