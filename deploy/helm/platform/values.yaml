# Vanilla Helm values — no cloud-specific assumptions, so the chart installs on
# any conformant Kubernetes (transportable across clouds and edge).

image:
  registry: ghcr.io
  repository: unboxd-cloud
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# Datasets are loaded at deployment time from a ConfigMap mounted at this path.
# Populate `files` via `--set-file` (see templates/configmap-datasets.yaml) or a
# GitOps values overlay. When empty, services fall back to built-in dev defaults.
datasets:
  enabled: true
  mountPath: /etc/platform/datasets
  files: {}
  # offerings.json: |
  #   [ ... ]

# Each entry is one single-responsibility service. OCI images are
# <registry>/<repository>/<name>:<tag>. The dataset env vars point at files in
# the mounted ConfigMap (see templates/configmap-datasets.yaml).
services:
  catalog:
    port: 8083
    env:
      CATALOG_ADDR: ":8083"
      CATALOG_DATASET: /etc/platform/datasets/offerings.json
  metering:
    port: 8081
    env:
      METERING_ADDR: ":8081"
  billing:
    port: 8082
    env:
      BILLING_ADDR: ":8082"
      PRICEBOOK_DATASET: /etc/platform/datasets/pricebook.json
      TAX_DATASET: /etc/platform/datasets/tax-rules.json
  compliance:
    port: 8084
    env:
      COMPLIANCE_ADDR: ":8084"
      COMPLIANCE_DATASET: /etc/platform/datasets/compliance-frameworks.json
  admin:
    port: 8080
    env:
      ADMIN_ADDR: ":8080"
      CATALOG_URL: "http://catalog:8083"
      BILLING_URL: "http://billing:8082"
      COMPLIANCE_URL: "http://compliance:8084"
      METERING_URL: "http://metering:8081"
      # k3s cluster-snapshot storage (S3). Seeds the platform-wide default shown
      # in the admin console; editable there. Credentials should come from a
      # Secret (see s3Snapshots below), not be committed in values.
      S3_BUCKET: ""
      S3_REGION: "us-east-1"
      S3_ENDPOINT: ""
      S3_PREFIX: "k3s-snapshots/"
      S3_SNAPSHOT_SCHEDULE: "0 */6 * * *"
      S3_RETENTION_DAYS: "14"
  orgconsole:
    port: 8085
    env:
      ORGCONSOLE_ADDR: ":8085"
      CATALOG_URL: "http://catalog:8083"
      BILLING_URL: "http://billing:8082"
      COMPLIANCE_URL: "http://compliance:8084"
      METERING_URL: "http://metering:8081"
      # k3s cluster-snapshot storage (S3) for this org; editable in the console.
      S3_BUCKET: ""
      S3_REGION: "us-east-1"
      S3_ENDPOINT: ""
      S3_PREFIX: "k3s-snapshots/"
      S3_SNAPSHOT_SCHEDULE: "0 */6 * * *"
      S3_RETENTION_DAYS: "14"

# The operator agent (GitOps + Kubernetes orchestrator). No service port. It is
# the k3s controller that takes cluster (etcd/datastore) snapshots to S3.
operator:
  enabled: true
  env:
    GITOPS_DIR: /etc/platform/datasets
    RECONCILE_INTERVAL: "30s"
    PROVIDER: kubernetes
    # k3s cluster-snapshot storage (S3); credentials via the s3Snapshots Secret.
    S3_BUCKET: ""
    S3_REGION: "us-east-1"
    S3_ENDPOINT: ""
    S3_PREFIX: "k3s-snapshots/"
    S3_SNAPSHOT_SCHEDULE: "0 */6 * * *"
    S3_RETENTION_DAYS: "14"

# S3 credentials for k3s cluster snapshots. Provide via --set or a sealed Secret;
# do not commit real keys. When set, wire S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY
# into the admin/orgconsole/operator env from this Secret in your overlay.
s3Snapshots:
  accessKeyID: ""
  secretAccessKey: ""

replicaCount: 1

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 128Mi

# Run as non-root, read-only rootfs — portable hardening defaults.
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
