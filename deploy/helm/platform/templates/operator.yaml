{{- if .Values.operator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: operator
  labels:
    app.kubernetes.io/name: operator
    {{- include "platform.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: operator
        {{- include "platform.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
      containers:
        - name: operator
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}/operator:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- range $k, $v := .Values.operator.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            capabilities:
              {{- toYaml .Values.securityContext.capabilities | nindent 14 }}
          {{- if and .Values.datasets.enabled .Values.datasets.files }}
          volumeMounts:
            - name: datasets
              mountPath: {{ .Values.datasets.mountPath }}
              readOnly: true
          {{- end }}
      {{- if and .Values.datasets.enabled .Values.datasets.files }}
      volumes:
        - name: datasets
          configMap:
            name: platform-datasets
      {{- end }}
{{- end }}
