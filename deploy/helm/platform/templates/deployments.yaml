{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "platform.labels" $root | nindent 4 }}
spec:
  replicas: {{ $root.Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        {{- include "platform.labels" $root | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: {{ $root.Values.securityContext.runAsNonRoot }}
        runAsUser: {{ $root.Values.securityContext.runAsUser }}
      containers:
        - name: {{ $name }}
          image: "{{ $root.Values.image.registry }}/{{ $root.Values.image.repository }}/{{ $name }}:{{ $root.Values.image.tag }}"
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          {{- with $svc.env }}
          env:
            {{- range $k, $v := . }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ $svc.port }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ $svc.port }}
          resources:
            {{- toYaml $root.Values.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: {{ $root.Values.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ $root.Values.securityContext.allowPrivilegeEscalation }}
            capabilities:
              {{- toYaml $root.Values.securityContext.capabilities | nindent 14 }}
{{- end }}
