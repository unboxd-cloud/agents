# The model-graph homepage as a Kubernetes workload. The image carries the
# embedded ADL model (see model.go), so it is stateless and self-contained — no
# volumes, no config. Apply with:
#
#   kubectl apply -f deploy/k8s/graph.yaml
#
# Set the image to wherever you pushed it (make publish PUBLISH_REGISTRY=...).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph
  labels:
    app.kubernetes.io/name: graph
    app.kubernetes.io/part-of: unboxd-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: graph
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graph
        app.kubernetes.io/part-of: unboxd-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8087"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: graph
          image: ghcr.io/unboxd-cloud/graph:latest
          imagePullPolicy: IfNotPresent
          env:
            - {name: GRAPH_ADDR, value: ":8087"}
          ports:
            - {name: http, containerPort: 8087}
          readinessProbe:
            httpGet: {path: /readyz, port: 8087}
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /healthz, port: 8087}
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests: {cpu: 25m, memory: 32Mi}
            limits: {cpu: 250m, memory: 128Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
---
apiVersion: v1
kind: Service
metadata:
  name: graph
  labels:
    app.kubernetes.io/name: graph
    app.kubernetes.io/part-of: unboxd-platform
spec:
  selector:
    app.kubernetes.io/name: graph
  ports:
    - {name: http, port: 80, targetPort: 8087}
---
# Optional ingress — adjust host/className to your cluster. Remove if you reach
# the Service another way (port-forward, NodePort, or LoadBalancer).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: graph
  labels:
    app.kubernetes.io/name: graph
    app.kubernetes.io/part-of: unboxd-platform
spec:
  rules:
    - http:
        paths:
          - path: /graph
            pathType: Prefix
            backend:
              service:
                name: graph
                port:
                  number: 80
