apiVersion: v1
kind: ServiceAccount
metadata:
  name: fabricops-deepagent
  namespace: agents
  labels:
    app.kubernetes.io/name: fabricops-deepagent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fabricops-deepagent-observer
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "endpoints", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fabricops-deepagent-observer
subjects:
  - kind: ServiceAccount
    name: fabricops-deepagent
    namespace: agents
roleRef:
  kind: ClusterRole
  name: fabricops-deepagent-observer
  apiGroup: rbac.authorization.k8s.io
